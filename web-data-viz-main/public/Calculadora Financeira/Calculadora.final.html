<!doctype html>

<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculadora Financeira</title>
  </head>

  <body>
    <h1>Calculadora Financeira</h1>

    (1 kg de queijo = 10 litros de leite)<br>
    Quantos litros de leite você produz por dia?
    <input type="number" id="input_litroLeite"><br><br>

    Qual o custo da produção de 1 litro de leite?
    <input type="number" id="input_custoLeiteLitro"><br><br>

    Preço do kg do queijo vendido:
    <input type="number" id="input_precoQueijo"><br><br>

    Gastos extras a mais do mês (R$):
    <input type="number" id="input_gastosExtra"> (Opcional)<br><br>

    <button onclick="simular()">Simular economia</button><br><br>
    <div id="div_mensagem"></div>

  </body>
</html>
<script>

  let simulacao = 0;

  function simular() {
    let litrosLeite = Number(input_litroLeite.value);
    let custoLeiteLitro = Number(input_custoLeiteLitro.value);
    let precoQueijoKg = Number(input_precoQueijo.value);
    let gastoExtra = Number(input_gastosExtra.value);



    // Quantos kg de queijo produziu no dia (kg)
    let total_queijo = litrosLeite / 10; // estimativa de 10L para 1 Kg queijo

    // O custo total da produção de leite do dia (R$)
    let custo_leiteTotal = litrosLeite * custoLeiteLitro;



    // Gastos totais (R$)
    let gastosTotais = custo_leiteTotal + gastoExtra

    // Lucro bruto, vendendo todos queijos sem gastos (R$)
    let lucroBruto = total_queijo * precoQueijoKg; 

    // Lucro liquido, vendendo todos queijos com gastos (R$)
    let lucroLiquido = lucroBruto - gastosTotais ;



    // Estatisticas aproximada com e sem sensor de perda somente dos queijos(R$)
    let perda_sem = (lucroBruto * 10 / 100) 
    let perda_com = (lucroBruto * 2 / 100)
    
    // Diferença que fizemos
    let diferenca = perda_sem - perda_com


  
    
    simulacao++;
    div_mensagem.innerHTML += `
    <b>Simulação ${simulacao}</b><br> 
    
    Produção de ${total_queijo} kg de queijo em um dia. <br> 
    O custo do leite para a produção em um dia foi de R$ ${custo_leiteTotal}.<br> 
    Total de gastos até o momento (custo do leite + extra) R$ ${gastosTotais}.<br>
    Seu lucro bruto estimado com a venda de todos queijos da produção do dia: R$ ${lucroBruto}<br>
    Seu lucro líquido estimado após os descontos é de R$ ${lucroLiquido}<br><br> 

    <b>Seus Riscos:</b><br> 
    Sem monitoramento, a perda estimada é de aproximadamente R$ ${perda_sem} por produção do dia.<br> 
    Com monitoramento VigLat, essa perda pode ser reduzida para cerca de R$ ${perda_com} por produção do dia.<br>
    Ou seja, <span style="color: red;"> o sistema pode evitar aproximadamente R$ ${diferenca} em perdas.</span><br>
    Se um incidente ocorrer uma vez por mês, ao longo de um ano o sistema pode gerar uma economia de R$ ${diferenca * 12} .<br>

<span>-----------------------------------------------------------------------------</span><br><br>`;
  }
</script>
