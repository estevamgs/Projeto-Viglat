<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">
       <a href="../index.html"><img src="../img/Viglat-removebg-preview.png" alt="" /></a>
      </div>
      <div class="right-header">
        <a href="../index.html">Início</a>
        <a href="../index.html#solucao">Solução</a>
        <a href="#">Contato</a>
        <button>Login</button>
      </div>
    </header>
    <div class="container">
      <div class="box">
        <div class="logo">
          <img src="../img/Viglat-removebg-preview.png" alt="" />
        </div>
        <div class="inputs">
          <h2>Acesse sua conta</h2>

          <div class="emailMaior">
            <p>Email</p>
            <div class="email">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                id="input_email"
                placeholder="seunome@email.com"
              />
            </div>
          </div>

          <div class="senhaMaior">
            <p>Senha</p>
            <div class="senha">
              <i class="bi bi-lock"></i>
              <input type="password" id="input_senha" placeholder="******" />
            </div>
          </div>
        </div>
        <button onclick="ent()">Entrar</button>
        <p>
          <a href="#">Esqueceu a senha?</a>
        </p>
        <p>
          Não possui cadastro?
          <a href="../Página de cadastro/Cadastro.html">Cadastre-se</a>
        </p>
      </div>
    </div>
  </body>
</html>
