<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viglat Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="viglat-app">
        <header class="viglat-navbar">
            <div class="nav-wrapper">
                <div class="viglat-logo">
                    <img src="/Viglat-removebg-preview.png" alt="Viglat Logo">
                </div>
                <nav class="links-navegacao">
                    <a href="#">Início</a>
                    <a href="#">Simulador Financeiro</a>
                    <a href="#">Contato</a>
                    <a href="#" class="btn-acesso">Login</a>
                </nav>
            </div>
        </header>

        <main class="painel-principal">
            <div class="seletor-unidades">
                <button class="aba-unidade ativa" onclick="trocarFazenda('1', this)">Fazenda 1</button>
                <button class="aba-unidade" onclick="trocarFazenda('2', this)">Fazenda 2</button>
            </div>

            <section id="view-fazenda" class="tela-monitoramento">
                <header class="cabecalho-secao">
                    <h2 id="titulo-fazenda">Visão Geral:</h2>
                    <div class="legenda-status">
                        <div class="status-item">
                            <span class="status-tag status-ideal">T: 10-14°C Ideal<br>U: 85-90% Ideal</span>
                        </div>
                        <div class="status-item">
                            <span class="status-tag status-alerta">T: 14-18°C Alerta<br>U: 90-95% Alerta</span>
                        </div>
                        <div class="status-item">
                            <span class="status-tag status-critico">T: 18°C+ Crítico<br>U: 95%+ Crítico</span>
                        </div>
                    </div>
                </header>

                <div class="grid-dispositivos">
                    <div class="card-dispositivo status-ideal" data-nome="Câmara 01" data-temp="19.5" data-umi="55" data-alertas="1" onclick="abrirDetalhes(this)">
                        <h3>Cam 01</h3>
                        <p>Estável</p>
                    </div>
                    <div class="card-dispositivo status-alerta" data-nome="Câmara 02" data-temp="23.1" data-umi="58" data-alertas="4" onclick="abrirDetalhes(this)">
                        <h3>Cam 02</h3>
                        <p>Atenção</p>
                    </div>
                    <div class="card-dispositivo status-ideal" data-nome="Câmara 03" data-temp="18.8" data-umi="54" data-alertas="0" onclick="abrirDetalhes(this)">
                        <h3>Cam 03</h3>
                        <p>Estável</p>
                    </div>
                    <div class="card-dispositivo status-critico" data-nome="Câmara 04" data-temp="25.4" data-umi="62" data-alertas="7" onclick="abrirDetalhes(this)">
                        <h3>Cam 04</h3>
                        <p>Crítico</p>
                    </div>
                </div>

                <div class="container-grafico-geral">
                    <canvas id=""></canvas>
                </div>
            </section>

            <section id="view-camara" class="tela-monitoramento" style="display: none;">
                <header class="cabecalho-secao">
                    <button class="btn-retorno" onclick="showView('view-fazenda')">← Voltar</button>
                    <h2 id="titulo-camara">Câmara 01</h2>
                </header>

                <div class="dashboard-kpis">
                    <div class="indicador-card">
                        <span class="rotulo-kpi">Temperatura Atual</span>
                        <span class="valor-kpi" id="kpi-temp">--°C</span>
                    </div>
                    <div class="indicador-card">
                        <span class="rotulo-kpi">Umidade Atual</span>
                        <span class="valor-kpi" id="kpi-umi">--%</span>
                    </div>
                    <div class="indicador-card">
                        <span class="rotulo-kpi">Alertas Hoje</span>
                        <span class="valor-kpi texto-critico" id="kpi-alertas">--</span>
                    </div>
                </div>

                <div class="dashboard-graficos">
                    <div class="grafico-detalhado"><canvas id=""></canvas></div>
                    <div class="grafico-detalhado"><canvas id=""></canvas></div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
