<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard VigLat</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

<h1>Dashboard | Análise de Câmara</h1>


<div class="container">

  <div class="card">
    <p>Temperatura Atual </p>
    <h2>20,3°C</h2>
  
  </div>

  <div class="card">
    <p>Umidade atual</p>
    <h2>85%</h2>
  </div>

  <div class="card">
    <p>Tempo acima da Umidade</p>
    <h2>⚠️1 min e 35s</h2>
    <span>Acarretou 2 Alertas</span>
  </div>

  <div class="card">
    <p>Tempo acima da Temperatura</p>
    <h2>⚠️ 2 min e 35s</h2>
    <span>Acarretou 3 Alertas</span>
  </div>

</div>

    <div style="display: flex; gap: 20px">
      <div style="width: 50%">
        <canvas id="graficoBarras"></canvas>
      </div>
      <div style="width: 50%">
        <canvas id="graficoLinha"></canvas>
      </div>
    </div>
  </body>
</html>

<script>
const dados = {
  horas: ["12:02", "12:04", "12:06", "12:08"],
  temperatura: [25, 21, 20, 22],
  umidade: [80, 82, 80, 85]
};

  const ctxx = document.getElementById("graficoBarras");

  new Chart(ctxx, {
    type: "bar",
    data: {
      labels: ['Segunda feira','Terça Feira','Quarta Feira','Quinta Feira','Sexta Feira','Sábado', 'Domingo'],
      datasets: [
        {
          label: "Alertas",
          data: [1,3,1,0,5,3,2],
          borderColor: "#CD1C18",
          backgroundColor: "#CD1C18",
        },
  
      ],
    },
    options: {
      plugins: {
        title: {
          display: true,
          text: "Quantidade de Alertas",
        },
      },
      scales: {
        y: {
          beginAtZero: true,
        },
      },
    },
  });

  const ctx = document.getElementById("graficoLinha");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: dados.horas,
      datasets: [
        {
          label: "Temperatura",
          data: dados.temperatura,
          borderColor: "#FF6384",
          backgroundColor: "#FFB1C1",
        },
        {
          label: "Umidade",
          data: dados.umidade,
          borderColor: "#36A2EB",
          backgroundColor: "#9BD0F5",
        },
      ],
    },
    options: {
      plugins: {
        title: {
          display: true,
          text: "Gráfico de Temperatura e URA (em tempo real)",
        },
      },
      scales: {
        y: {
          beginAtZero: true,
        },
      },
    },
  });
</script>
