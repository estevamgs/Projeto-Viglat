<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Financeira</title>
    <link rel="stylesheet" href="../css/calculadora.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <header>
      <div class="container">
        <nav>
          <div class="logo">
            <a href="../index.html">
              <img src="../img/Viglat-removebg-preview.png" alt="" />
            </a>
          </div>
          <ul class="ul">
            <li><a href="../index.html">Início</a></li>
            <li>
              <a href="../Calculadora Financeira/Calculadora.html"
                >Simulador Financeiro</a
              >
            </li>
            <li><a href="../index.html#contato">Contato</a></li>
            <li>
              <a class="btn-gradiente" href="../Página de login/login.html"
                >Login</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="container2">
      <div class="content">
        <div class="contas">
          <div class="caixa-maior">
            <div class="caixa-menor">
              <p>
                Litros de Leite Produzidos
                <br />
                (1 kg = 10 litros)
              </p>
              <div class="input-group">
                <input
                  type="number"
                  id="input_litroLeite"
                  placeholder="Litros de leite por dia"
                />
              </div>
            </div>

            <div class="caixa-menor">
              <p>Custo da produção de 1 litro</p>
              <div class="input-group">
                <input
                  type="number"
                  id="input_custoLeiteLitro"
                  placeholder="Custo por litro (R$)"
                />
              </div>
            </div>

            <div class="caixa-menor">
              <p>Preço do kg do queijo vendido</p>
              <div class="input-group">
                <input
                  type="number"
                  id="input_precoQueijo"
                  placeholder="Preço por kg (R$)"
                />
              </div>
            </div>

            <div class="caixa-menor">
              <p>Gastos extras a mais do mês (R$)</p>
              <div class="input-group">
                <input
                  required
                  type="number"
                  id="input_gastosExtra"
                  placeholder="Gastos extras (opcional)"
                />
              </div>
            </div>
            <div class="cad-botao-resposta">
              <button onclick="simular()">
                <i class="bi bi-calculator"></i><span>Simular economia</span>
              </button>
              <div id="div_mensagem">
                <div class="boxMsg1">
                  <h6>Gastos Totais</h6>
                  <h6 id="resp1">R$ -</h6>
                </div>
                <div class="boxMsg2">
                  <h6>Valor Bruto</h6>
                  <h6 id="resp2">R$ -</h6>
                </div>
                <div class="boxMsg3">
                  <h6>Valor Líquido</h6>
                  <h6 id="resp3">R$ -</h6>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function simular() {
        let litrosLeite = Number(input_litroLeite.value);
        let custoLeiteLitro = Number(input_custoLeiteLitro.value);
        let precoQueijoKg = Number(input_precoQueijo.value);
        let gastoExtra = Number(input_gastosExtra.value) || 0;

        // Quantos kg de queijo produziu no dia (kg)
        let total_queijo = litrosLeite / 10; // estimativa de 10L para 1 Kg queijo

        // O custo total da produção de leite do dia (R$)
        let custo_leiteTotal = litrosLeite * custoLeiteLitro;

        // Gastos totais (R$)
        let gastosTotais = custo_leiteTotal + gastoExtra;

        let lucroBruto = total_queijo * precoQueijoKg;

        // Lucro liquido, vendendo todos queijos com gastos (R$)
        let lucroLiquido = lucroBruto - gastosTotais;

        resp1.innerHTML = `${gastosTotais.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}`;
        resp2.innerHTML = `${lucroBruto.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}`;
        resp3.innerHTML = `${lucroLiquido.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}`;

        if (lucroLiquido >= 0) {
          resp3.style.color = "green";
        } else {
          resp3.style.color = "red";
        }
      }
    </script>
  </body>
</html>
