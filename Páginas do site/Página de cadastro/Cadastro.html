<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Cadastro de usuário</h1>

    <div class="Container">
      <h2>Crie sua conta</h2>
      <div class="Container2">
        <h3><b>Seu nome</b></h3>
        <input id="in_nom" placeholder="Nome e sobrenome" />
        <br />

        <h3><b>E-mail</b></h3>
        <input id="in_ema" placeholder="seunome@email.com" />
        <br />

        <h3><b>Senha</b></h3>
        <input id="in_sen" placeholder="Pelo menos 6 caractéres" />
        <br /><br />
        <div class="botoes">
          <button onclick="cad()">Cadastrar</button>
          <br />
          <p>
            Já possui conta?
            <a href="./login.html">Faça login</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
