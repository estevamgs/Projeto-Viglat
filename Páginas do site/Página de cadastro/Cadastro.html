<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Cadastro de usuário</h1>

    <div class="container">
      <h2>Crie sua conta</h2>
      <div class="content">
        <h3><b>Seu nome</b></h3>
        <input id="ipt_nome" type="text" placeholder="Nome e sobrenome" />
        <br />

        <h3><b>E-mail</b></h3>
        <input id="ipt_email" type="email" placeholder="seunome@email.com" />
        <br />

        <h3><b>Senha</b></h3>
        <input
          id="ipt_senha"
          type="password"
          placeholder="Pelo menos 6 caractéres"
        />
        <br /><br />
        <div class="cad-botao">
          <button onclick="cad()">Cadastrar</button>
          <br />
          <p>
            Já possui conta?
            <a href="./login.html">Faça login</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
